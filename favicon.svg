<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B6EF3"/>
      <stop offset="100%" style="stop-color:#0D4FC4"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- N letter -->
  <text x="4" y="23" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="17" fill="white" letter-spacing="-1">NC</text>
  <!-- Small dot accent (the "click" dot) -->
  <circle cx="27" cy="26" r="2.5" fill="#7DBAFF"/>
</svg>
